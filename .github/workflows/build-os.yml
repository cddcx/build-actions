name: Build OS

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      URL:
        description: '选择源码：'
        default: 'openwrt'
        required: true
        type: choice
        options: [ openwrt,  immortalwrt ]
        
      branch:
        description: '源码的分支(immortalwrt无main)'
        default: 'openwrt-25.12'
        required: true
        type: choice
        options: [ main, master, openwrt-23.05,  openwrt-24.10 openwrt-25.12 ]
        
      config_s:
        description: '选择config配置文件'
        default: 'op-daed.config'
        required: true
        type: choice
        options: [ op-daed.config, op.config, im.config, im-daed.config, dae.config ]
  
      diy1_s:
        description: '自定义diy1'
        default: 'op-diy1.s'
        required: true
        type: choice
        options: [ op-diy1.sh, im-diy1.sh ]
          
      diy2_s:
        description: '自定义diy2'
        default: 'op-diy2-daed.sh'
        required: true
        type: choice
        options: [ op-diy2.sh, op-diy2-daed.sh, im-diy2.sh, im-diy2-daed.sh ]
        
      target:
        description: '选择要生成的机型：'
        default: 'x86_64'
        required: true
        type: choice
        options: [ x86_64 ]

env:
  FEEDS_CONF: feeds.conf.default
  FILES: files
  UPLOAD_BIN_DIR: false
  UPLOAD_IPK_DIR: false
  UPLOAD_RELEASE: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id
    
    name: 编译${{github.event.inputs.URL}}-${{github.event.inputs.target}}
    env:
      REPO_URL: ${{github.event.inputs.URL}}
      REPO_BRANCH: ${{github.event.inputs.branch}}
      CONFIG_FILE: configs/${{github.event.inputs.config_s}}
      DIY_P1_SH: diy/${{github.event.inputs.diy1_s}}
      DIY_P2_SH: diy/${{github.event.inputs.diy2_s}}
      TARGET_DEVICE: ${{github.event.inputs.target}}

    steps:
    - name: 准备完成
      uses: actions/checkout@main

    - name: 释放磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: true
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo /bin/bash -c "$(curl -sL https://git.io/vokNn)"
        sudo -E apt-fast -y -qq install asciidoc bash bcc bin86 binutils bison bzip2 clang file flex g++ g++-multilib gawk gcc-multilib gettext git gzip help2man \
        intltool libbpf-dev libboost-dev libelf-dev libncurses-dev libssl-dev libthread-queue-any-perl libusb-dev libxml-parser-perl linux-tools-generic llvm \
        make patch perl-modules pkg-config python3-dev python3-pip python3-pyelftools python3-setuptools rsync sharutils swig time unzip util-linux wget xsltproc zlib1g-dev zip zstd
        sudo -E apt-fast -y -qq install dos2unix dwarves jq npm quilt
        sudo -E npm install -g pnpm
        sudo -E npm install -g n
        sudo -E n stable
        pip3 install --user -U pylibfdt --break-system-packages
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdi

    - name: 克隆源码
      working-directory: /workdir
      run: |
        # 设置编译源代码
          if [[ "${{github.event.inputs.URL}}" == *"openwrt"* ]]; then
              REPO_URL="https://github.com/openwrt/openwrt"
          elif [[ "${{github.event.inputs.URL}}" == *"immortalwrt"* ]]; then
              REPO_URL="https://github.com/immortalwrt/immortalwrt"
          else
              echo "源代码仓库的地址无法被识别或无法访问."
              exit 1
          fi
        # 克隆源代码
        git clone $REPO_URL -b ${{env.REPO_BRANCH}} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: DIY1(一般用于安装依赖和插件)
      run: |
        [[ -f "${FEEDS_CONF}" ]] && cp -f ${FEEDS_CONF} openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: 安装并更新feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: 加载自定义设置
      run: |
        [[ -d "${FILES}" ]] && mv -f ${FILES} openwrt/files
        [[ -e "${CONFIG_FILE}" ]] && cp -f ${CONFIG_FILE} openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread build"
        make -j$(nproc) || make -j1 || make -j1 V=s
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        # 整理固件包时候,删除您不想要的固件或者文件,让它不需要上传到Actions空间
        rm -rf packages
        rm -rf feeds.buildinfo
        rm -rf version.buildinfo
        rm -rf *kernel.bin
        rm -rf profiles.json
        rm -rf *rootfs.img
        rm -rf *rootfs.tar.gz
        rm -rf *.manifest
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件
      uses: actions/upload-artifact@main
      with:
        name: ${{github.event.inputs.URL}}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
